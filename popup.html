<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
  <div class="logo-area">
    <img src="icons/48px.png" alt="logo" class="header-icon">
    <h1>Watch Later Enhanced</h1>
  </div>
  <div class="header-actions">
    <button id="toggle-sound" class="icon-btn" title="Toggle Sound">🔊</button>
    <button id="clear-all" class="icon-btn" title="Clear All">🗑️</button>
  </div>
</header>

  <main>
    <ul id="video-list"></ul>
    
    <div id="tutorial" class="tutorial-container" style="display: none;">
      <div class="tutorial-card">
        <h3>How to use</h3>
        <p>Hold the <b>Alt</b> key and <b>Click</b> on any YouTube video to save it instantly.</p>
        <div class="tutorial-visual">
          <span>⌨️ + 🖱️</span>
          <br>
          <span class="key-badge">ALT + RIGHT CLICK</span>
        </div>
      </div>
    </div>
  </main>
  
  <script src="popup.js"></script>
</body>
</html>
